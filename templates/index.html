<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Maincraft Prototype</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div id="hud">
      <div id="title">MAINCRAFT</div>
      <div id="help">
        WASD/Arrows move | Space jump/fly | Shift sink | Mouse look | Click break | Right click place | T chat | E inventory | H photo mode
      </div>
      <div id="status">Connecting...</div>
    </div>

    <div id="chat">
      <div id="chat-log"></div>
      <input id="chat-input" placeholder="Type message and press Enter" />
    </div>

    <div id="inventory" class="hidden">
      <div id="inventory-header">
        <div id="inventory-title">Inventory (Creative)</div>
      </div>
      <div id="world-dashboard">
        <div class="dash-header">World Dashboard</div>
        <div class="dash-row">
          <label for="chunk-distance">Chunk Distance</label>
          <input id="chunk-distance" type="range" min="3" max="9" step="2" value="3" />
          <div id="chunk-distance-value">3 chunks</div>
        </div>
        <div class="dash-lines" id="dash-lines"></div>
        <div id="dashboard-goals" class="dash-goals"></div>
        <div class="dash-actions">
          <button id="btn-photo-mode" type="button">Photo Mode [H]</button>
          <button id="btn-center-camera" type="button">Center View</button>
          <button id="btn-toggle-lantern" type="button">Lantern [F]</button>
          <button id="btn-open-tools" type="button">Tools [P]</button>
          <button id="btn-open-live-map" type="button">Live Map [L]</button>
          <button id="btn-open-schem" type="button">Schematic [O]</button>
          <button id="btn-open-panel" type="button">Panel</button>
          <button id="btn-open-tutorial" type="button">Tutorial</button>
          <button id="btn-open-wiki" type="button">Wiki</button>
          <button id="btn-open-clone" type="button">Clone</button>
        </div>
      </div>

      <div id="inventory-layout">
        <div id="equipment-panel">
          <div class="equip-slot" data-slot="helmet">H</div>
          <div class="equip-slot" data-slot="chest">C</div>
          <div class="equip-slot" data-slot="legs">L</div>
          <div class="equip-slot" data-slot="boots">B</div>
        </div>

        <div id="player-preview">
          <div id="player-avatar">PLAYER</div>
          <div id="offhand-slot">OFF</div>
        </div>

        <div id="crafting">
          <div id="craft-title">Crafting</div>
          <div id="craft-grid">
            <div class="craft-slot" data-slot="0"></div>
            <div class="craft-slot" data-slot="1"></div>
            <div class="craft-slot" data-slot="2"></div>
            <div class="craft-slot" data-slot="3"></div>
          </div>
          <div id="craft-output">
            <div class="craft-slot output"></div>
          </div>
          <button id="recipe-book">Recipe Book</button>
        </div>
      </div>

      <div id="palette-panel">
        <div id="palette-title">All Blocks</div>
        <div id="palette-grid"></div>
      </div>

      <div id="inventory-grid"></div>
      <div id="inventory-hotbar"></div>
      <div id="chest-panel" class="hidden">
        <div id="chest-title">Chest</div>
        <div id="chest-grid"></div>
      </div>
    </div>

    <div id="hotbar"></div>

    <div id="crosshair"></div>
    <div id="cursor-item" class="hidden"></div>
    <div id="break-bar" class="hidden"></div>

    <canvas id="game"></canvas>

    <script type="module" src="/static/game.js"></script>
  </body>
</html>
